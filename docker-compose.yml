services:
  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
    container_name: workflow-editor
    ports:
      - "8085:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: workflow-network
