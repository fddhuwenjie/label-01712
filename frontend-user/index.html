<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可视化工作流编辑器</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
            <div class="toolbar-left">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>WorkFlow</span>
                </div>
                <div class="workflow-actions">
                    <button class="btn btn-secondary" id="newWorkflow">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        新建工作流
                    </button>
                    <button class="btn btn-secondary" id="loadWorkflow">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 15v4c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                        </svg>
                        加载工作流
                    </button>
                </div>
            </div>
            <div class="toolbar-right">
                <button class="btn btn-secondary" id="dataManager" title="数据管理">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <ellipse cx="12" cy="5" rx="9" ry="3"/>
                        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                    </svg>
                    数据管理
                </button>
                <button class="btn btn-primary" id="saveWorkflow">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17,21 17,13 7,13 7,21"/>
                        <polyline points="7,3 7,8 15,8"/>
                    </svg>
                    保存
                </button>
                <button class="btn btn-success" id="runWorkflow">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="5,3 19,12 5,21 5,3"/>
                    </svg>
                    运行
                </button>
            </div>
        </header>

        <div class="main-content">
            <!-- 左侧组件面板 -->
            <aside class="component-panel">
                <div class="panel-header">
                    <h3>组件库</h3>
                </div>
                <div class="component-list">
                    <div class="component-category">
                        <h4>输入组件</h4>
                        <div class="component-item" draggable="true" data-type="number-input">
                            <div class="component-icon number">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 4h16v16H4z"/>
                                    <path d="M9 9h6M9 12h6M9 15h4"/>
                                </svg>
                            </div>
                            <span>数字输入</span>
                        </div>
                        <div class="component-item" draggable="true" data-type="text-input">
                            <div class="component-icon text">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 7V4h16v3M9 20h6M12 4v16"/>
                                </svg>
                            </div>
                            <span>文字输入</span>
                        </div>
                    </div>
                    <div class="component-category">
                        <h4>逻辑组件</h4>
                        <div class="component-item" draggable="true" data-type="condition">
                            <div class="component-icon condition">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 3l9 9-9 9-9-9 9-9z"/>
                                </svg>
                            </div>
                            <span>条件判断</span>
                        </div>
                    </div>
                    <div class="component-category">
                        <h4>输出组件</h4>
                        <div class="component-item" draggable="true" data-type="output">
                            <div class="component-icon output">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                                    <path d="M7 7h10M7 12h10M7 17h6"/>
                                </svg>
                            </div>
                            <span>结果输出</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 右侧工作区域 -->
            <main class="workspace" id="workspace">
                <svg class="connections-layer" id="connectionsLayer"></svg>
                <div class="canvas" id="canvas">
                    <div class="canvas-grid"></div>
                    <div class="empty-state" id="emptyState">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z"/>
                            <path d="M2 17L12 22L22 17"/>
                            <path d="M2 12L12 17L22 12"/>
                        </svg>
                        <h3>开始构建你的工作流</h3>
                        <p>从左侧拖拽组件到此区域</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 保存工作流模态框 -->
    <div class="modal" id="saveModal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>💾 保存工作流</h3>
                <button class="modal-close" id="closeSaveModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="workflowNameInput">工作流名称</label>
                    <input type="text" id="workflowNameInput" class="form-input" placeholder="请输入名称...">
                </div>
                <div class="form-hint">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                    数据将保存在浏览器本地存储中
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="workflowEditor.hideSaveModal()">取消</button>
                <button class="btn btn-primary" id="confirmSaveBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17,21 17,13 7,13 7,21"/>
                        <polyline points="7,3 7,8 15,8"/>
                    </svg>
                    保存
                </button>
            </div>
        </div>
    </div>

    <!-- 加载工作流模态框 -->
    <div class="modal" id="loadModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>加载工作流</h3>
                <button class="modal-close" id="closeLoadModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="workflow-list" id="workflowList">
                    <p class="no-workflows">暂无保存的工作流</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 运行结果模态框 -->
    <div class="modal" id="resultModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>运行结果</h3>
                <button class="modal-close" id="closeResultModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>
    </div>

    <!-- 数据管理模态框 -->
    <div class="modal" id="dataModal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3>🗄️ 数据管理</h3>
                <button class="modal-close" id="closeDataModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="data-tabs">
                    <button class="data-tab active" data-tab="workflows">已保存的工作流</button>
                    <button class="data-tab" data-tab="raw">原始数据</button>
                </div>
                <div class="data-content" id="dataContent">
                    <!-- 动态内容 -->
                </div>
                <div class="data-actions">
                    <button class="btn btn-secondary" id="exportData">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7,10 12,15 17,10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        导出数据
                    </button>
                    <button class="btn btn-secondary" id="importData">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17,8 12,3 7,8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        导入数据
                    </button>
                    <button class="btn btn-danger" id="clearAllData">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3,6 5,6 21,6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                        清空所有
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 确认弹窗 -->
    <div class="modal" id="confirmModal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3 id="confirmTitle">确认操作</h3>
                <button class="modal-close" id="closeConfirmModal">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage" class="confirm-message"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="confirmCancel">取消</button>
                <button class="btn btn-danger" id="confirmOk">确定</button>
            </div>
        </div>
    </div>

    <input type="file" id="importFileInput" accept=".json" style="display: none;">

    <!-- Toast 通知 -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
